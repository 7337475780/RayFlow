services:
  # 1. PostgreSQL Database Service
  db:
    image: postgres:16-alpine
    container_name: rayflow-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=rayflow_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      # Named volume for persistent database storage
      - postgres_data:/var/lib/postgresql/data
      # Mount schema and sample seeds to auto-run on container initialization
      - ./db/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./db/sample_data.sql:/docker-entrypoint-initdb.d/2-sample_data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rayflow_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Spring Boot API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rayflow-api
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=jdbc:postgresql://db:5432/rayflow_db
      - DATABASE_USERNAME=postgres
      - DATABASE_PASSWORD=postgres
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
