services:
  # 1. Spring Boot Web API Service
  - type: web
    name: rayflow-api
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        sync: true
      - key: DATABASE_USERNAME
        sync: true
      - key: DATABASE_PASSWORD
        sync: true
      - key: CORS_ALLOWED_ORIGINS
        value: "*" # Overridden in production by Vercel deployment URL
      - key: RENDER_EXTERNAL_URL
        fromLocation: env # Auto-populated by Render with the active HTTPS endpoint URL
