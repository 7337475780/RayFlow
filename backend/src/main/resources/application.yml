server:
  port: ${PORT:8080}
  error:
    include-stacktrace: never

spring:
  application:
    name: rayflow-api

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/rayflow_db}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
